packages:
  - apps/*
  - packages/*

catalog:
  "@carbon/charts-svelte": ^1.22.18
  "@libsql/client": ^0.17.2
  "@sveltejs/adapter-auto": ^6
  "@sveltejs/kit": ^2
  "@sveltejs/vite-plugin-svelte": ^5
  "@types/node": ^24
  better-auth: ^1.5.6
  carbon-components-svelte: ^0.105.0
  carbon-icons-svelte: ^13.10.0
  carbon-pictograms-svelte: ^13.16.0
  carbon-preprocess-svelte: ^0.11.28
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  svelte: ^5
  testcontainers: ^11.13.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.14

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
